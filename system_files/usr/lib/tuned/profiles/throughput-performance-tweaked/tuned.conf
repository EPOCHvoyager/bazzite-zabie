#
# tuned configuration
#

[main]
summary = Broadly applicable tuning that provides excellent performance across a variety of common server workloads - includes extra memory and other misc. tweaks
include = throughput-performance

[cpu]
governor = schedutil|ondemand|powersave

[audio]
# See 17c869d upstream
timeout = 0

[sysctl]
# Values adapted from:
# https://gist.github.com/ahydronous/7ceaa00df96ef99131600edd4c2c73f2
# https://github.com/CachyOS/CachyOS-Settings/blob/ca713b482cf5322cdc8b6202b677bb0ba3d8873d/usr/lib/sysctl.d/99-cachyos-settings.conf
vm.swappiness = 133
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
vm.dirty_background_bytes = 209715200
vm.dirty_bytes = 419430400
vm.vfs_cache_pressure = 66
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 1500

# page-cluster controls the number of pages up to which consecutive pages are read in from swap in a single attempt.
# This is the swap counterpart to page cache readahead. The mentioned consecutivity is not in terms of virtual/physical addresses,
# but consecutive on swap space - that means they were swapped out together. (Default is 3)
# increase this value to 1 or 2 if you are using physical swap (1 if ssd, 2 if hdd)
vm.page-cluster = 1

# Convention says KiB of RAM * 0.01
# From MPW: RAM / num_of_logical_cores * 0.058
# 16777216 KiB / 8 threads * 0.058 = 121634
# NOTE: The following value is appropriate for 16 logical threads.
vm.min_free_kbytes = 60817

[scsi_host]
alpm = max_performance
